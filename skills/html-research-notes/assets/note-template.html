<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>[Note Title]</title>
  <style>
    body{font-family:"Microsoft YaHei",Arial,sans-serif;line-height:1.65;margin:0;background:#f6f7f9;color:#1b1f24}
    main{max-width:960px;margin:auto;padding:28px 16px}
    section{background:#fff;border:1px solid #d8dde6;border-radius:8px;padding:18px;margin:14px 0}
    table{width:100%;border-collapse:collapse}td,th{border:1px solid #d8dde6;padding:8px}th{background:#eef2f7;text-align:left}
  </style>
</head>
<body>
<main>
  <section>
    <h1>[Note Title]</h1>
    <table>
      <tr><th>Status</th><td>[draft/reviewed/final]</td></tr>
      <tr><th>Owner</th><td>[name]</td></tr>
      <tr><th>Last updated</th><td>[date]</td></tr>
      <tr><th>Sources</th><td>[links]</td></tr>
    </table>
  </section>
  <section>
    <h2>Summary</h2>
    <p>[summary]</p>
  </section>
</main>
</body>
</html>
