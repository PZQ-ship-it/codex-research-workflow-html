interface:
  display_name: "Manuscript to PPT Workflow"
  short_description: "Route staged PPT workflow with hard stops"
  default_prompt: "Use $manuscript-to-ppt-workflow to route me to the next PPT stage, then stop for confirmation before continuing."
dependencies:
  tools:
    - type: "local"
      value: "python-pptx"
      description: "Python library for inspecting and generating editable PPTX files"
    - type: "local"
      value: "PowerPoint COM"
      description: "Windows PowerPoint automation for rendering slides to PNG/PDF during QA"
    - type: "skill"
      value: "openrouter-icu-image"
      description: "Optional synchronous image generation/editing for source-grounded PPT visual enrichment"
policy:
  allow_implicit_invocation: true
